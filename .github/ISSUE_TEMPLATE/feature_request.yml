name: Feature request
description: Suggest an improvement for Qbot
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or workflow you want.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include screenshots, links, or related upstream OpenClaw context if relevant.
