name: Bug report
description: Report a reproducible problem in Qbot
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Qbot.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal set of steps.
      placeholder: |
        1. Open the app
        2. Go to ...
        3. Click ...
        4. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: 0.1.0
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant logs or attach screenshots if available.
